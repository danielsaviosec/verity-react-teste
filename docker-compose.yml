services:
  dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
      - "3001:3001"
    command: sh -c "npm ci && npm run dev:docker"
    environment:
      - NODE_ENV=development

  prod:
    build:
      context: .
      target: production
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production

volumes:
  node_modules:
